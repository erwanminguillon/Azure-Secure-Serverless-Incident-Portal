# Docs for the Azure Functions Action:
# https://github.com/Azure/functions-action
# More GitHub Actions for Azure:
# https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - func-ssip-dev-frc-01

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: src/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Resolve project dependencies using npm
        run: npm install

      - name: Build project
        run: npm run build --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: Show build output
        run: |
          echo "=== src/api root ==="
          ls -la
          echo "=== dist tree ==="
          find dist -maxdepth 4 -type f | sort

      - name: Create deployment zip from function app root
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: functionapp-package
          path: src/api/release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: functionapp-package
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.__clientidsecretname__ }}
          tenant-id: ${{ secrets.__tenantidsecretname__ }}
          subscription-id: ${{ secrets.__subscriptionidsecretname__ }}

      - name: Run Azure Functions Action
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'func-ssip-dev-frc-01'
          slot-name: 'Production'
          package: 'release.zip'

          # Flex Consumption-specific
          sku: 'flexconsumption'
          remote-build: true
          enable-oryx-build: true
          scm-do-build-during-deployment: true
          respect-funcignore: true
