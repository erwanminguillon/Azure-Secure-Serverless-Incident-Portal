name: Deploy Functions - func-ssip-dev-frc-01

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: func-ssip-dev-frc-01
  AZURE_FUNCTIONAPP_PACKAGE_PATH: src/api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: src/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies (validation)
        run: npm install

      - name: Build locally (validation)
        run: npm run build

      - name: Show build output
        run: |
          echo "=== src/api root ==="
          ls -la
          echo "=== dist tree ==="
          find dist -maxdepth 4 -type f | sort

      - name: Deploy to Azure Functions (Flex Consumption)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          sku: flexconsumption
          remote-build: true
          enable-oryx-build: true
          scm-do-build-during-deployment: true
          respect-funcignore: true